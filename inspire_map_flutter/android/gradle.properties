org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
kotlin.incremental=false
# Avoid cross-drive root issues by disabling daemon for this build if necessary, 
# or at least ensuring incremental is off in the daemon.
kotlin.daemon.jvm.options="-Dkotlin.incremental=false"
org.gradle.daemon=false
